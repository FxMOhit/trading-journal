<body>
<div id="root"></div>
<script src="assets/app.js"></script>
<!-- ── Eye Widget ── -->
<style>
  #eye-widget {
    position: fixed;
    bottom: 30px;
    right: 80px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  #eye-face {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    box-shadow: var(--sh2);
    position: relative;
    cursor: pointer;
    transition: transform 0.35s cubic-bezier(.34,1.4,.64,1), border-color 0.3s, box-shadow 0.3s;
  }

  #eye-face:hover {
    transform: scale(1.1);
    border-color: var(--border2);
    box-shadow: var(--sh3);
  }

  .eye-dot {
    width: 10px;
    height: 10px;
    background: var(--acc);
    border-radius: 50%;
    position: absolute;
    top: 23px;
    transition: height 0.18s ease, border-radius 0.18s ease;
    will-change: transform;
  }

  .eye-dot.el { left: 14px; }
  .eye-dot.er { right: 14px; }

  #eye-face:hover .eye-dot {
    height: 2px;
    border-radius: 2px;
  }

  #eye-label { display: none; }

  @media (max-width: 768px) {
    #eye-widget { display: none; }
  }

  /* flash overlay — covers entire viewport */
  #eye-flash {
    position: fixed;
    inset: 0;
    z-index: 99999;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
  }

  #eye-flash.go {
    animation: eyeFlashBg 0.9s steps(1) forwards;
    pointer-events: all;
  }

  @keyframes eyeFlashBg {
    0%   { opacity:1; background: var(--acc); }
    12%  { opacity:1; background: var(--surface); }
    25%  { opacity:1; background: var(--acc); }
    37%  { opacity:1; background: var(--surface); }
    50%  { opacity:1; background: var(--acc); }
    62%  { opacity:1; background: var(--surface); }
    75%  { opacity:1; background: var(--acc); }
    87%  { opacity:1; background: var(--surface); }
    100% { opacity:0; }
  }

  #eye-flash-text {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: 0.03em;
    font-family: 'Inter', sans-serif;
    opacity: 0;
  }

  #eye-flash.go #eye-flash-text {
    animation: eyeFlashTxt 0.9s steps(1) forwards;
  }

  @keyframes eyeFlashTxt {
    0%   { opacity:1; color: var(--surface); }
    12%  { opacity:1; color: var(--acc); }
    25%  { opacity:1; color: var(--surface); }
    37%  { opacity:1; color: var(--acc); }
    50%  { opacity:1; color: var(--surface); }
    62%  { opacity:1; color: var(--acc); }
    75%  { opacity:1; color: var(--surface); }
    87%  { opacity:1; color: var(--acc); }
    100% { opacity:0; }
  }
</style>

<div id="eye-widget">
  <div id="eye-face" onclick="eyeTriggerFlash()">
    <div class="eye-dot el" id="eyeWidgetL"></div>
    <div class="eye-dot er" id="eyeWidgetR"></div>
  </div>
  <div id="eye-label">watching</div>
</div>

<div id="eye-flash">
  <div id="eye-flash-text">YOU BITCHHHH</div>
</div>

<script>
  (function() {
    const eL = document.getElementById('eyeWidgetL');
    const eR = document.getElementById('eyeWidgetR');
    let mx = window.innerWidth / 2, my = window.innerHeight / 2;
    let lx=0,ly=0,rx=0,ry=0;

    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

    function target(eye) {
      const r = eye.getBoundingClientRect();
      const dx = mx - (r.left + r.width/2);
      const dy = my - (r.top + r.height/2);
      const a = Math.atan2(dy, dx);
      const d = Math.min(14, Math.hypot(dx,dy) / 5);
      return { x: Math.cos(a)*d, y: Math.sin(a)*d };
    }

    (function loop() {
      const tL = target(eL), tR = target(eR);
      lx += (tL.x - lx) * 0.12; ly += (tL.y - ly) * 0.12;
      rx += (tR.x - rx) * 0.12; ry += (tR.y - ry) * 0.12;
      eL.style.transform = `translate(${lx.toFixed(2)}px,${ly.toFixed(2)}px)`;
      eR.style.transform = `translate(${rx.toFixed(2)}px,${ry.toFixed(2)}px)`;
      requestAnimationFrame(loop);
    })();
  })();

  function eyeTriggerFlash() {
    const el = document.getElementById('eye-flash');
    el.classList.remove('go');
    void el.offsetWidth;
    el.classList.add('go');
    el.addEventListener('animationend', () => { el.classList.remove('go'); }, { once: true });
  }
</script>


</body>
