/* ── ERROR BOUNDARY ── */
class ErrorBoundary extends Component{
  constructor(p){super(p);this.state={err:false,msg:''};}
  static getDerivedStateFromError(e){return{err:true,msg:e?.message||''};}
  render(){
    if(this.state.err)return(
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#f7f8fa',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
        <div style={{fontSize:48,marginBottom:16}}>⚠️</div>
        <h2 style={{fontSize:18,fontWeight:600,marginBottom:8}}>Something went wrong</h2>
        <p style={{color:'#3d4a5c',marginBottom:20,fontSize:14,maxWidth:340,textAlign:'center',lineHeight:1.7}}>{this.state.msg||'An unexpected error occurred.'}</p>
        <button onClick={()=>this.setState({err:false})} style={{background:'#c8983a',color:'#fff',border:'none',borderRadius:10,padding:'11px 28px',fontSize:14,fontWeight:700,cursor:'pointer'}}>Try Again</button>
      </div>
    );
    return this.props.children;
  }
}

function inferCapital(trades){
  const s=[...trades].sort((a,b)=>a.entryDate.localeCompare(b.entryDate)||a.entryTime.localeCompare(b.entryTime));
  for(const t of s){if(t.profit&&t.pnl&&Math.abs(t.pnl)>0)return Math.abs(t.profit/(t.pnl/100));}
  return 1000;
}
function deriveDir(t){
  if(t.entryPrice&&t.exitPrice&&t.pnl!==0){const up=t.exitPrice>t.entryPrice,win=t.pnl>0;if(up&&win)return'Long';if(up&&!win)return'Short';if(!up&&win)return'Short';return'Long';}
  return t.side||'Long';
}

function Chip({children,color='gray',size='sm'}){
  const map={
    green:['var(--gBg)','var(--gBdr)','var(--green)'],
    profit:['var(--accL)','color-mix(in srgb, var(--acc) 30%, transparent)','var(--accD)'],
    loss:['var(--s3)','var(--border2)','var(--t2)'],
    gold:['var(--accF)','color-mix(in srgb, var(--acc) 35%, transparent)','var(--accD)'],
    blue:['var(--bBg)','var(--bBdr)','var(--blue)'],
    purple:['var(--pBg)','var(--pBdr)','var(--purple)'],
    orange:['var(--oBg)','var(--oBdr)','var(--orange)'],
    cyan:['var(--cBg)','var(--cBdr)','var(--cyan)'],
    red:['var(--rBg)','var(--rBdr)','var(--red)'],
    gray:['var(--s3)','var(--border)','var(--t2)'],
    truegreen:['var(--gBg)','var(--gBdr)','var(--green)'],
  };
  const[bg,bdr,txt]=map[color]||map.gray;
  const pad=size==='sm'?'2px 8px':size==='lg'?'5px 14px':'4px 11px';
  const fs=size==='sm'?'10px':size==='lg'?'13px':'11px';
  return <span className="chip" style={{background:bg,border:`1px solid ${bdr}`,color:txt,padding:pad,fontSize:fs}}>{children}</span>;
}

/* ── MINI SPARKLINE ── */
function Sparkline({pts,w=120,h=36,color}){
  if(!pts||pts.length<2)return <div style={{width:w,height:h}}/>;
  const lo=Math.min(...pts),hi=Math.max(...pts),rng=hi-lo||1;
  const P=2,IW=w-P*2,IH=h-P*2;
  const xi=i=>(i/(pts.length-1||1))*IW+P;
  const yi=v=>IH-((v-lo)/rng)*IH+P;
  const d=pts.map((v,i)=>`${i===0?'M':'L'}${xi(i).toFixed(1)},${yi(v).toFixed(1)}`).join(' ');
  const last=pts[pts.length-1];
  const col=color||(last>=0?'var(--acc)':'#94a3b8');
  const fill=`${d} L${xi(pts.length-1).toFixed(1)},${IH+P} L${P},${IH+P} Z`;
  const gid=`sg${w}${h}${Math.abs(last).toFixed(0)}`;
  return <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block',overflow:'hidden'}}>
    <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={col} stopOpacity={0.2}/><stop offset="100%" stopColor={col} stopOpacity={0.02}/></linearGradient></defs>
    <path d={fill} fill={`url(#${gid})`}/>
    <path d={d} fill="none" stroke={col} strokeWidth={1.8} strokeLinejoin="round" strokeLinecap="round"/>
  </svg>;
}

/* ── HORIZONTAL BAR WITH LABEL ── */
function HBar({label,value,max,color='var(--acc)',subtitle,rightLabel}){

/* ── DONUT ── */
function Donut({pct,size=56,color='var(--acc)',label}){
  const r=23,cx=32,cy=32,circ=2*Math.PI*r;
  const dash=Math.max(0,Math.min(circ,circ*(pct/100)));
  return <svg width={size} height={size} viewBox="0 0 64 64">
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--s3)" strokeWidth={7}/>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={7}
      strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" transform="rotate(-90 32 32)"
      style={{transition:'stroke-dasharray .6s ease'}}/>
    <text x={cx} y={cy+4} textAnchor="middle" fontSize={11} fontWeight={700} fill="var(--text)" fontFamily="Plus Jakarta Sans">{label||pct.toFixed(0)+'%'}</text>
  </svg>;
}

/* ── PROFIT CURVE ── */
const ProfitCurve=memo(function ProfitCurve({trades,height=140}){
  const svgRef=useRef(null);
  const[hover,setHover]=useState(null);
  const[mounted,setMounted]=useState(false);
  const pathRef=useRef(null);
  useEffect(()=>{setMounted(false);const t=setTimeout(()=>setMounted(true),60);return()=>clearTimeout(t)},[trades.length]);
  useEffect(()=>{
    if(!mounted||!pathRef.current)return;
    const len=pathRef.current.getTotalLength?.()??2000;
    pathRef.current.style.strokeDasharray=len;
    pathRef.current.style.strokeDashoffset=len;
    pathRef.current.style.transition='stroke-dashoffset 1.1s cubic-bezier(.4,0,.2,1)';
    requestAnimationFrame(()=>{pathRef.current&&(pathRef.current.style.strokeDashoffset='0')});
  },[mounted]);
  const sorted=[...trades].sort((a,b)=>a.entryDate.localeCompare(b.entryDate)||a.entryTime.localeCompare(b.entryTime));
  let cum=0;
  const pts=[{x:0,y:0,date:'Start'},{...sorted.map((t,i)=>{cum+=t.pnl;return{x:i+1,y:cum,date:t.entryDate,pnl:t.pnl,label:t.symbol}})}];
  const allPts=[{x:0,y:0,date:'Start'},...sorted.map((t,i)=>{let c2=0;for(let j=0;j<=i;j++)c2+=sorted[j].pnl;return{x:i+1,y:c2,date:t.entryDate,pnl:t.pnl,label:t.symbol}})];
  const maxX=allPts.length-1||1;
  const lo=Math.min(...allPts.map(p=>p.y)),hi=Math.max(...allPts.map(p=>p.y)),rng=hi-lo||1;
  const PAD={t:8,b:20,l:42,r:12};
  const W=900,H=height,IW=W-PAD.l-PAD.r,IH=H-PAD.t-PAD.b;
  const sx=x=>(x/maxX)*IW+PAD.l;
  const sy=y=>IH-((y-lo)/rng)*IH+PAD.t;
  const last=allPts[allPts.length-1].y;
  const col=last>=0?'var(--acc)':'#94a3b8';
  const zero=Math.max(PAD.t,Math.min(PAD.t+IH,sy(Math.max(lo,Math.min(0,hi)))));
  const d=allPts.map((p,i)=>`${i===0?'M':'L'}${sx(p.x).toFixed(1)},${sy(p.y).toFixed(1)}`).join(' ');
  const fill=`${d} L${sx(maxX).toFixed(1)},${zero.toFixed(1)} L${sx(0).toFixed(1)},${zero.toFixed(1)} Z`;
  const ySteps=Array.from({length:5},(_,i)=>lo+(rng/4)*i);
  const handleMove=useCallback(e=>{
    const rect=svgRef.current?.getBoundingClientRect();if(!rect)return;
    const mx=((e.clientX-rect.left)/rect.width)*W;
    const idx=Math.max(0,Math.min(maxX,Math.round((mx-PAD.l)/IW*maxX)));
    setHover({idx});
  },[maxX]);
  const hp=hover!=null?allPts[hover.idx]:null;
  return <div style={{position:'relative'}}>
    <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`} style={{display:'block',cursor:'crosshair'}}
      onMouseMove={handleMove} onMouseLeave={()=>setHover(null)}>
      <defs>
        <linearGradient id="pcg" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={col} stopOpacity={0.15}/>
          <stop offset="100%" stopColor={col} stopOpacity={0.01}/>
        </linearGradient>
        <clipPath id="pcc"><rect x={PAD.l} y={PAD.t} width={IW} height={IH}/></clipPath>
      </defs>
      {ySteps.map((v,i)=><g key={i}>
        <line x1={PAD.l} x2={PAD.l+IW} y1={sy(v)} y2={sy(v)} stroke="var(--border)" strokeWidth={.7}/>
        <text x={PAD.l-5} y={sy(v)+4} textAnchor="end" fontSize={9} fill="var(--t3)" fontFamily="Plus Jakarta Sans">{fmtPct(v,0)}</text>
      </g>)}
      {lo<0&&hi>0&&<line x1={PAD.l} x2={PAD.l+IW} y1={zero} y2={zero} stroke="var(--border2)" strokeWidth={1} strokeDasharray="4,3"/>}
      <path d={fill} fill="url(#pcg)" clipPath="url(#pcc)" style={{opacity:mounted?1:0,transition:'opacity .6s'}}/>
      <path ref={pathRef} d={d} fill="none" stroke={col} strokeWidth={2.2} strokeLinejoin="round" strokeLinecap="round" clipPath="url(#pcc)"/>
      <circle cx={sx(maxX)} cy={sy(last)} r={4} fill={col} stroke="white" strokeWidth={2} opacity={mounted?1:0} style={{transition:'opacity .3s .8s'}}/>
      {hp&&hover.idx>0&&<g style={{pointerEvents:'none'}}>
        <line x1={sx(hover.idx)} x2={sx(hover.idx)} y1={PAD.t} y2={PAD.t+IH} stroke={col} strokeWidth={1} strokeDasharray="3,3" opacity={.5}/>
        <circle cx={sx(hover.idx)} cy={sy(hp.y)} r={5} fill={col} stroke="white" strokeWidth={2}/>
      </g>}
    </svg>
    {hp&&hover.idx>0&&(()=>{
      const frac=sx(hover.idx)/W;
      const left=frac>.72?'auto':`calc(${Math.round(frac*100)}% + 10px)`;
      const right=frac>.72?'10px':'auto';
      return <div style={{position:'absolute',top:4,left,right,background:'var(--surface)',border:'1px solid var(--border)',borderRadius:12,padding:'11px 15px',fontSize:11,pointerEvents:'none',zIndex:10,minWidth:160,boxShadow:'0 8px 30px rgba(0,0,0,.12)'}}>
        <div style={{fontWeight:500,marginBottom:6,fontSize:12,borderBottom:'1px solid var(--border)',paddingBottom:6}}>{hp.date}</div>
        <div style={{display:'flex',justifyContent:'space-between',gap:14,marginBottom:4}}>
          <span style={{color:'var(--t3)'}}>Cum P&L</span>
          <span style={{fontWeight:700,color:hp.y>=0?'var(--accD)':'var(--t2)'}}>{fmtPct(hp.y)}</span>
        </div>
        {hp.pnl!=null&&<div style={{display:'flex',justifyContent:'space-between',gap:14}}>
          <span style={{color:'var(--t3)'}}>{hp.label||'Trade'}</span>
          <span style={{fontWeight:700,color:hp.pnl>=0?'var(--accD)':'var(--t2)'}}>{fmtPct(hp.pnl)}</span>
        </div>}
      </div>;
    })()}
  </div>;
});

/* ── DATE RANGE BAR ── */
function DateRangeBar({trades,dateRange,setDateRange}){

  const presets=[
    {id:'all',label:'All',fn:()=>apply('all',null,null)},
    {id:'thisweek',label:'This Week',fn:()=>{const mon=new Date(today);mon.setDate(today.getDate()-((today.getDay()+6)%7));const sun=new Date(mon);sun.setDate(mon.getDate()+6);apply('thisweek',mon.toISOString().slice(0,10),sun.toISOString().slice(0,10))}},
    {id:'thismonth',label:'Month',fn:()=>{const y=today.getFullYear(),m=today.getMonth();const last=new Date(y,m+1,0);apply('thismonth',`${y}-${String(m+1).padStart(2,'0')}-01`,last.toISOString().slice(0,10))}},
    {id:'30d',label:'30 Days',fn:()=>{const from=new Date(today);from.setDate(from.getDate()-30);apply('30d',from.toISOString().slice(0,10),today.toISOString().slice(0,10))}},
  ];
  const filtered=dateRange.from||dateRange.to?trades.filter(t=>(!dateRange.from||t.entryDate>=dateRange.from)&&(!dateRange.to||t.entryDate<=dateRange.to)):trades;
  const totalP=filtered.reduce((s,t)=>s+(t.profit||0),0);
  const totalPnl=filtered.reduce((s,t)=>s+t.pnl,0);
  return <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:13,padding:'11px 16px',marginBottom:16,display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>

    </div>
  </div>;
}

/* ══════════════════════════════════════════════════

  const pnlPts=[];let runPnl=0;[...trades].sort((a,b)=>a.entryDate.localeCompare(b.entryDate)).forEach(t=>{runPnl+=t.pnl;pnlPts.push(runPnl)});

  const avgExpRR=expectedRR.length?expectedRR.reduce((s,v)=>s+v,0)/expectedRR.length:0;

  // Sparkline data per KPI (last 7 daily values)

        {label:'AVG EXP. RR',val:avgExpRR>0?`1:${avgExpRR.toFixed(1)}`:'—',sub:'Target reward ratio',accent:'var(--purple)',key:null,spark:[],sparkCol:'#7c3aed'},

/* ══════════════════════════════════════════════════
   ANALYTICS TAB - Win rates by confluence, session, model etc.
══════════════════════════════════════════════════ */
const Analytics=memo(function Analytics({trades,uiBlocks={}}){
  const[activeView,setActiveView]=useState('confluence');
  if(!trades.length)return <div style={{textAlign:'center',padding:'80px 20px',color:'var(--t3)'}}>No trade data to analyze yet.</div>;

  // By Confluence
  const confMap={};trades.forEach(t=>{(t.confluences||[]).forEach(c=>{if(!confMap[c])confMap[c]={n:0,w:0,pnl:0,profit:0};confMap[c].n++;if(t.pnl>0)confMap[c].w++;confMap[c].pnl+=t.pnl;confMap[c].profit+=(t.profit||0)})});
  const confData=Object.entries(confMap).sort((a,b)=>b[1].n-a[1].n).map(([name,d])=>({name,wr:d.n?d.w/d.n*100:0,...d}));

  // By Session
  const sessMap={};trades.forEach(t=>{const s=t.session||'Unknown';if(!sessMap[s])sessMap[s]={n:0,w:0,pnl:0,profit:0};sessMap[s].n++;if(t.pnl>0)sessMap[s].w++;sessMap[s].pnl+=t.pnl;sessMap[s].profit+=(t.profit||0)});
  const sessData=Object.entries(sessMap).sort((a,b)=>b[1].n-a[1].n).map(([name,d])=>({name,wr:d.n?d.w/d.n*100:0,...d}));

  // By Model
  const modelMap={};trades.forEach(t=>{const m=t.model||'Unknown';if(!modelMap[m])modelMap[m]={n:0,w:0,pnl:0,profit:0};modelMap[m].n++;if(t.pnl>0)modelMap[m].w++;modelMap[m].pnl+=t.pnl;modelMap[m].profit+=(t.profit||0)});
  const modelData=Object.entries(modelMap).sort((a,b)=>b[1].n-a[1].n).map(([name,d])=>({name,wr:d.n?d.w/d.n*100:0,...d}));

  // By Grade
  const gradeMap={};trades.forEach(t=>{const g=t.grade||'—';if(!gradeMap[g])gradeMap[g]={n:0,w:0,pnl:0,profit:0};gradeMap[g].n++;if(t.pnl>0)gradeMap[g].w++;gradeMap[g].pnl+=t.pnl;gradeMap[g].profit+=(t.profit||0)});

  // By Expected RR

  const symData=Object.entries(symMap).sort((a,b)=>b[1].n-a[1].n).map(([name,d])=>({name,wr:d.n?d.w/d.n*100:0,...d}));

  const views=[{id:'confluence',label:'Confluences'},{id:'session',label:'Sessions'},{id:'model',label:'Models'},{id:'symbol',label:'Symbols'},{id:'grade',label:'Grade Quality'}];

        <div style={{fontSize:12,fontWeight:700,color:row.profit>=0?'var(--accD)':'var(--t2)'}}>{fmtUSD(row.profit,true)}</div>
      </div>)}

    {/* Summary Row */}
    <div className="g4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>

        {label:'BEST MODEL',val:modelData.sort((a,b)=>b.wr-a.wr)[0]?.name?.split(' ')[0]||'—',sub:modelData.sort((a,b)=>b.wr-a.wr)[0]?`${modelData.sort((a,b)=>b.wr-a.wr)[0].wr.toFixed(0)}% win rate`:'',accent:'var(--purple)'},
        {label:'BEST SYMBOL',val:symData.sort((a,b)=>b.wr-a.wr)[0]?.name||'—',sub:symData.sort((a,b)=>b.wr-a.wr)[0]?`${symData.sort((a,b)=>b.wr-a.wr)[0].wr.toFixed(0)}% win rate`:'',accent:'var(--green)'},

    </div>
  </div>;
});

const Psychology=memo(function Psychology({trades,uiBlocks={}}){
  if(!trades.length)return <div style={{textAlign:'center',padding:'80px 20px',color:'var(--t3)'}}>Log trades with emotion data to unlock psychology insights.</div>;
  const emotBefore={};trades.forEach(t=>{const e=t.emotionBefore||'Neutral';if(!emotBefore[e])emotBefore[e]={n:0,w:0,pnl:0};emotBefore[e].n++;if(t.pnl>0)emotBefore[e].w++;emotBefore[e].pnl+=t.pnl});
  const emotAfter={};trades.forEach(t=>{const e=t.emotionAfter||'Neutral';if(!emotAfter[e])emotAfter[e]={n:0,w:0};emotAfter[e].n++;if(t.pnl>0)emotAfter[e].w++});
  const mistakeMap={};trades.forEach(t=>{const m=t.mistakes||'None';if(!mistakeMap[m])mistakeMap[m]={n:0,loss:0};mistakeMap[m].n++;if(t.pnl<=0)mistakeMap[m].loss++});
  const totalTrades=trades.length;
  const disciplineScore=Math.round((trades.filter(t=>t.mistakes==='None'||!t.mistakes).length/totalTrades)*100);
  const bestEmotion=Object.entries(emotBefore).sort((a,b)=>(b[1].w/b[1].n)-(a[1].w/a[1].n))[0];
  const worstEmotion=Object.entries(emotBefore).sort((a,b)=>(a[1].w/a[1].n)-(b[1].w/b[1].n))[0];
  const topMistake=Object.entries(mistakeMap).filter(([m])=>m!=='None').sort((a,b)=>b[1].n-a[1].n)[0];
  const mistakeRate=Math.round((trades.filter(t=>t.mistakes&&t.mistakes!=='None').length/totalTrades)*100);

  return <div style={{display:'flex',flexDirection:'column',gap:16}} className="fade-up">
    {/* Summary */}
    <div className="g4" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14}}>
      {[
        {label:'Discipline Score',val:`${disciplineScore}%`,sub:disciplineScore>=80?'Excellent':disciplineScore>=60?'Good':'Needs work',accent:disciplineScore>=80?'var(--green)':disciplineScore>=60?'var(--acc)':'var(--t3)',key:'disciplineScore'},
        {label:'Best Mindset',val:bestEmotion?bestEmotion[0].split(' ')[0]||'—':'—',sub:bestEmotion?`${((bestEmotion[1].w/bestEmotion[1].n)*100).toFixed(0)}% win rate in this state`:'',accent:'var(--acc)',key:'bestMindset'},
        {label:'Worst Mindset',val:worstEmotion&&worstEmotion[1].n>1?worstEmotion[0].split(' ')[0]:'—',sub:worstEmotion&&worstEmotion[1].n>1?`${((worstEmotion[1].w/worstEmotion[1].n)*100).toFixed(0)}% win rate`:'',accent:'var(--border2)',key:'worstMindset'},
        {label:'Mistake Rate',val:`${mistakeRate}%`,sub:topMistake&&topMistake[0]!=='None'?`Top: ${topMistake[0].split(' ').slice(0,2).join(' ')}`:'Clean execution',accent:mistakeRate>30?'var(--orange)':mistakeRate>15?'var(--acc)':'var(--green)',key:'mistakeRate'},
      ].filter(k=>uiBlocks[k.key]!==false).map((k,i)=><div key={i} className="card count-up" style={{borderTop:`2px solid ${k.accent}`,paddingTop:18,animationDelay:`${i*60}ms`}}>
        <div style={{fontSize:10,fontWeight:500,color:'var(--t3)',letterSpacing:.2,marginBottom:10}}>{k.label}</div>
        <div style={{fontSize:28,fontWeight:600,letterSpacing:'-1px',fontFamily:"'Outfit',sans-serif"}}>{k.val}</div>
        <div style={{fontSize:11,color:'var(--t3)',marginTop:6,fontWeight:400}}>{k.sub}</div>
      </div>)}
    </div>

    <div className="g2" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      {/* Emotion before → performance */}
      <div className="card">
        <Label>Pre-Trade Mindset Performance</Label>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:6}}>
          {Object.entries(emotBefore).sort((a,b)=>b[1].n-a[1].n).map(([e,d])=>{
            const wr=d.n?d.w/d.n*100:0;
            const positive=['Calm & Focused','Confident','Neutral'];
            const col=positive.includes(e)?'var(--acc)':wr>=50?'var(--acc)':'var(--t3)';
            return <div key={e} style={{display:'flex',alignItems:'center',gap:10}}>
              <EmotionChip emotion={e}/>
              <div style={{flex:1,height:5,background:'var(--s3)',borderRadius:4,overflow:'hidden'}}>
                <div style={{width:`${wr}%`,height:'100%',background:col,borderRadius:4,opacity:.85}}/>
              </div>
              <span style={{fontSize:11,fontWeight:500,color:col,width:38,textAlign:'right'}}>{wr.toFixed(0)}%</span>
              <span style={{fontSize:10,color:'var(--t3)',width:18}}>{d.n}t</span>
            </div>;
          })}
        </div>
        <div style={{marginTop:12,padding:'10px 14px',background:'var(--s2)',borderRadius:10,fontSize:12,color:'var(--t2)',lineHeight:1.6}}>
          💡 Trade only when Calm & Focused. Emotions like FOMO and Greed historically lead to losses.
        </div>
      </div>

      {/* Mistakes breakdown */}
      <div className="card">
        <Label>Mistake Frequency</Label>
        <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:6}}>
          {Object.entries(mistakeMap).filter(([m])=>m!=='None').sort((a,b)=>b[1].n-a[1].n).map(([m,d])=>{
            const lossRate=d.n?d.loss/d.n*100:0;
            return <div key={m}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:600,color:'var(--text)'}}>{m}</span>
                <div style={{display:'flex',gap:8}}>
                  <span style={{fontSize:10,color:'var(--t3)'}}>{d.n} times</span>
                  <span style={{fontSize:11,fontWeight:400,color:lossRate>50?'var(--t2)':'var(--t3)'}}>{lossRate.toFixed(0)}% result in loss</span>
                </div>
              </div>
              <div style={{height:4,background:'var(--s3)',borderRadius:3,overflow:'hidden'}}>
                <div style={{width:`${(d.n/totalTrades)*100}%`,height:'100%',background:'var(--acc)',borderRadius:3,opacity:.6}}/>
              </div>
            </div>;
          })}
          {Object.keys(mistakeMap).filter(m=>m!=='None').length===0&&<div style={{color:'var(--t3)',fontSize:13,textAlign:'center',padding:'20px 0'}}>No mistakes recorded 🎉</div>}
        </div>
      </div>
    </div>

    {/* Discipline Timeline */}
    <div className="card">
      <Label>Trade Quality Timeline (last 20 trades)</Label>
      <div style={{display:'flex',gap:4,marginTop:10,flexWrap:'wrap'}}>
        {[...trades].sort((a,b)=>b.entryDate.localeCompare(a.entryDate)).slice(0,20).reverse().map((t,i)=>{
          const g=t.grade||'B';
          const hasMistake=t.mistakes&&t.mistakes!=='None';
          const gradeColor={'A+':'var(--accD)','A':'var(--accD)','B':'var(--acc)','C':'var(--t2)','D':'var(--t3)'}[g]||'var(--t2)';
          return <div key={i} title={`${t.symbol} ${t.entryDate} | Grade: ${g} | ${hasMistake?'⚠ '+t.mistakes:'Clean'}`} style={{width:36,height:52,borderRadius:8,border:`1.5px solid ${hasMistake?'var(--accD)':'var(--border)'}`,background:'var(--surface)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:'default'}}>
            <span style={{fontSize:9,fontWeight:500,color:gradeColor}}>{g}</span>
            <div style={{width:5,height:5,borderRadius:'50%',background:t.pnl>0?'var(--acc)':'var(--border2)'}}/>
            {hasMistake&&<span style={{fontSize:7,color:'var(--acc)'}}>!</span>}
          </div>;
        })}
      </div>
      <div style={{display:'flex',gap:16,marginTop:12,fontSize:11,color:'var(--t3)'}}>
        <span>● Accent = Win</span><span>● Gray = Loss</span><span>! = Mistake</span>
        <span>Border = mistake flag</span>
      </div>
    </div>

    {/* Post-trade emotion → actual outcome */}
    <div className="card">
      <Label>Post-Trade Outcomes by Feeling</Label>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(180px,1fr))',gap:10,marginTop:8}}>
        {Object.entries(emotAfter).sort((a,b)=>b[1].n-a[1].n).map(([e,d])=>{
          const wr=d.n?d.w/d.n*100:0;
          return <div key={e} style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:11,padding:'12px 14px'}}>
            <EmotionChip emotion={e}/>
            <div style={{marginTop:10,display:'flex',gap:12}}>
              <div><div style={{fontSize:9.5,color:'var(--t3)',fontWeight:400,letterSpacing:.1,marginBottom:2}}>Win Rate</div><div style={{fontSize:18,fontWeight:600,color:wr>=50?'var(--acc)':'var(--t2)'}}>{wr.toFixed(0)}%</div></div>
              <div><div style={{fontSize:9.5,color:'var(--t3)',fontWeight:400,letterSpacing:.1,marginBottom:2}}>Count</div><div style={{fontSize:18,fontWeight:500}}>{d.n}</div></div>
            </div>
          </div>;
        })}
      </div>
    </div>
  </div>;
});


/* ══════════════════════════════════════════════════
   TRADE LOG (with all new fields)
══════════════════════════════════════════════════ */
function TradeLog({trades,onAdd,onDelete,onEdit,onUpdateMeta,tradeMeta}){
  const blank={symbol:'XAUUSD',entryDate:'',entryTime:'09:00:00',side:'Long',entryPrice:'',exitPrice:'',pnl:'',profit:'',status:'Closed',grade:'A',expectedRR:'1:2',actualRR:'',session:'London',model:'SMC (Smart Money)',emotionBefore:'Calm & Focused',emotionAfter:'Satisfied',mistakes:'None',confluences:[],notes:''};
  const[form,setForm]=useState(blank);
  const[open,setOpen]=useState(false);
  const[editingId,setEditingId]=useState(null);
  const[symF,setSymF]=useState('All');
  const[sideF,setSideF]=useState('All');
  const[gradeF,setGradeF]=useState('All');
  const[expandedId,setExpandedId]=useState(null);
  const[screenshots,setScreenshots]=useState({});
  const[sf,setF]=useState('entryDate');
  const[sd,setD]=useState(-1);
  const isMobile=useMediaQuery('(max-width:768px)');
  const[sessF,setSessF]=useState('All');
  const[modelF,setModelF]=useState('All');
  const[showFilters,setShowFilters]=useState(false);
  const syms=['All',...new Set(trades.map(t=>t.symbol))];
  const sessOpts=['All',...SESSIONS];
  const modelOpts=['All',...MODELS];
  const inp={border:'1.5px solid var(--border)',borderRadius:9,padding:'8px 11px',fontSize:12,outline:'none',background:'var(--s2)',color:'var(--text)',width:'100%',boxSizing:'border-box',fontFamily:'inherit'};
  const sel={...inp,cursor:'pointer'};
  const toggleSort=f=>{if(sf===f)setD(d=>-d);else{setF(f);setD(-1)}};
  const activeFilters=[symF,sideF,gradeF,sessF,modelF].filter(f=>f!=='All').length;
  const visible=useMemo(()=>[...trades].filter(t=>
    (symF==='All'||t.symbol===symF)&&
    (sideF==='All'||t.side===sideF)&&
    (gradeF==='All'||t.grade===gradeF)&&
    (sessF==='All'||t.session===sessF)&&
    (modelF==='All'||t.model===modelF)
  ).sort((a,b)=>{let va=a[sf],vb=b[sf];if(['pnl','entryPrice','exitPrice','profit'].includes(sf)){va=+va;vb=+vb}return va>vb?sd:va<vb?-sd:0}),[trades,symF,sideF,gradeF,sessF,modelF,sf,sd]);

  const handleSave=useCallback(()=>{
    if(!form.entryDate||!form.entryPrice)return;
    const td={...form,entryPrice:+form.entryPrice,exitPrice:+form.exitPrice,pnl:+form.pnl||0,profit:+form.profit||0};
    if(editingId){onEdit(editingId,td);}else{onAdd({...td,id:Date.now()});}
    setForm(blank);setEditingId(null);setOpen(false);
  },[form,editingId,onAdd,onEdit]);

  const startEdit=useCallback(t=>{setForm({symbol:t.symbol,entryDate:t.entryDate,entryTime:t.entryTime,side:t.side||deriveDir(t),entryPrice:String(t.entryPrice),exitPrice:String(t.exitPrice||''),pnl:String(t.pnl),profit:String(t.profit||''),status:t.status||'Closed',grade:t.grade||'A',expectedRR:t.expectedRR||'1:2',actualRR:t.actualRR||'',session:t.session||'London',model:t.model||'SMC (Smart Money)',emotionBefore:t.emotionBefore||'Calm & Focused',emotionAfter:t.emotionAfter||'Satisfied',mistakes:t.mistakes||'None',confluences:t.confluences||[],notes:t.notes||''});setEditingId(t.id);setOpen(true)},[]);

  const handleScreenshot=useCallback(async(id,file)=>{if(!file)return;try{const c=await SDB.compress(id,file);setScreenshots(s=>({...s,[id]:c}));onUpdateMeta(id,{hasScreenshot:true})}catch(e){console.error(e)}},[onUpdateMeta]);
  const handleRemoveShot=useCallback(async id=>{try{await SDB.remove(id);setScreenshots(s=>{const n={...s};delete n[id];return n});onUpdateMeta(id,{hasScreenshot:false})}catch(e){console.error(e)}},[onUpdateMeta]);

  useEffect(()=>{
    if(!expandedId)return;
    const meta=tradeMeta[expandedId]||{};
    if(meta.hasScreenshot&&!screenshots[expandedId]){
      setScreenshots(s=>({...s,[expandedId]:'__loading__'}));
      SDB.get(expandedId).then(data=>{if(data)setScreenshots(s=>({...s,[expandedId]:data}));else setScreenshots(s=>{const n={...s};delete n[expandedId];return n})}).catch(()=>setScreenshots(s=>{const n={...s};delete n[expandedId];return n}));
    }
  },[expandedId,tradeMeta]);

  const toggleConfluence=c=>{setForm(f=>({...f,confluences:f.confluences.includes(c)?f.confluences.filter(x=>x!==c):[...f.confluences,c]}))};

const CalendarView=memo(function CalendarView({trades,onDayClick}){
  const[month,setMonth]=useState(new Date().getMonth());
  const[year,setYear]=useState(new Date().getFullYear());
  const[mode,setMode]=useState('pct');
  const ic=inferCapital(trades);
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const byDate={};trades.forEach(t=>{if(!byDate[t.entryDate])byDate[t.entryDate]={profit:0,count:0,trades:[]};byDate[t.entryDate].profit+=(t.profit||0);byDate[t.entryDate].count++;byDate[t.entryDate].trades.push(t)});
  Object.keys(byDate).forEach(d=>{byDate[d].pnl=(byDate[d].profit/ic)*100});
  const first=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();
  const cells=[...Array(first).fill(null),...Array.from({length:days},(_,i)=>i+1)];
  const dk=d=>`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const mEntries=Object.entries(byDate).filter(([d])=>{const[y,m]=d.split('-').map(Number);return y===year&&m-1===month});
  const mProfit=mEntries.reduce((s,[,v])=>s+v.profit,0);
  const mPnl=(mProfit/ic)*100;
  const mCount=mEntries.reduce((s,[,v])=>s+v.count,0);
  const maxP=Math.max(...Object.values(byDate).map(d=>Math.abs(d.profit)),1);
  const weeks=[];for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
  const weekStats=weeks.map(w=>{const p=w.filter(Boolean).reduce((s,d)=>s+(byDate[dk(d)]?.profit||0),0);return{profit:p,pnl:(p/ic)*100,count:w.filter(Boolean).reduce((s,d)=>s+(byDate[dk(d)]?.count||0),0)}});
  const fmt=(p,pct)=>mode==='pct'?fmtPct(pct,1):fmtUSD(p);
  const todayStr=new Date().toISOString().slice(0,10);

  return <div className="fade-up">
    <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:20,flexWrap:'wrap'}}>
      <button onClick={()=>{if(month===0){setMonth(11);setYear(y=>y-1)}else setMonth(m=>m-1)}} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,width:34,height:34,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t2)'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--acc)';e.currentTarget.style.color='var(--acc)'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--t2)'}}>‹</button>
      <select value={month} onChange={e=>setMonth(+e.target.value)} style={{border:'1px solid var(--border)',borderRadius:10,padding:'6px 12px',fontSize:13,fontWeight:700,background:'var(--surface)',cursor:'pointer',outline:'none',color:'var(--text)'}}>{MN.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
      <select value={year} onChange={e=>setYear(+e.target.value)} style={{border:'1px solid var(--border)',borderRadius:10,padding:'6px 12px',fontSize:13,fontWeight:700,background:'var(--surface)',cursor:'pointer',outline:'none',color:'var(--text)'}}>{[2024,2025,2026,2027].map(y=><option key={y}>{y}</option>)}</select>
      <button onClick={()=>{if(month===11){setMonth(0);setYear(y=>y+1)}else setMonth(m=>m+1)}} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:10,width:34,height:34,cursor:'pointer',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t2)'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--acc)';e.currentTarget.style.color='var(--acc)'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--t2)'}}>›</button>
      <div style={{display:'flex',border:'1.5px solid var(--border)',borderRadius:10,overflow:'hidden'}}>
        <button onClick={()=>setMode('pct')} style={{padding:'6px 18px',fontSize:12,fontWeight:700,background:mode==='pct'?'linear-gradient(135deg,var(--acc),var(--accD))':'var(--surface)',color:mode==='pct'?'#fff':'var(--t3)',border:'none',cursor:'pointer'}}>%</button>
        <button onClick={()=>setMode('usd')} style={{padding:'6px 18px',fontSize:12,fontWeight:700,background:mode==='usd'?'linear-gradient(135deg,var(--acc),var(--accD))':'var(--surface)',color:mode==='usd'?'#fff':'var(--t3)',border:'none',cursor:'pointer'}}>$</button>
      </div>
      <div style={{marginLeft:'auto',display:'flex',gap:8,alignItems:'center'}}>
        {mCount>0&&<Chip color="gray">{mCount} trades</Chip>}
        <div style={{background:mProfit>=0?'var(--accF)':'var(--s3)',border:`1px solid ${mProfit>=0?'color-mix(in srgb, var(--acc) 30%, transparent)':'var(--border)'}`,borderRadius:9,padding:'5px 14px'}}>
          <span style={{fontSize:13,fontWeight:700,color:mProfit>=0?'var(--accD)':'var(--t2)'}}>Total: {fmt(mProfit,mPnl)}</span>
        </div>
      </div>
    </div>
    <div style={{overflowX:'auto'}}>
      <div style={{minWidth:600}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr) 90px',gap:4,marginBottom:4}}>
          {DOW.map(d=><div key={d} style={{textAlign:'center',fontSize:9.5,color:'var(--t3)',fontWeight:400,padding:'5px 0'}}>{d}</div>)}
          <div style={{textAlign:'center',fontSize:9.5,color:'var(--t3)',fontWeight:400,padding:'5px 0'}}>WEEK</div>
        </div>
        {weeks.map((week,wi)=><div key={wi} style={{display:'grid',gridTemplateColumns:'repeat(7,1fr) 90px',gap:4,marginBottom:4}}>
          {[...Array(7)].map((_,ci)=>{
            const d=week[ci];
            if(!d)return <div key={`e${ci}`} style={{borderRadius:12,minHeight:80}}/>;
            const dateKey=dk(d);
            const data=byDate[dateKey];
            const p=data?.profit||0;
            const pct=data?.pnl||0;
            const has=!!data;
            const intensity=has?Math.min(1,Math.abs(p)/maxP*2):0;
            const bg=!has?'var(--surface)':p>=0?`color-mix(in srgb, var(--acc) ${Math.round((.07+intensity*.22)*100)}%, var(--surface))`:`rgba(148,163,184,${.1+intensity*.2})`;
            const bdr=!has?'var(--border)':p>=0?'color-mix(in srgb, var(--acc) 30%, transparent)':'var(--border2)';
            const isToday=dateKey===todayStr;
            return <div key={dateKey} onClick={()=>has&&onDayClick(dateKey)} style={{background:bg,border:`1.5px solid ${isToday?'var(--indigo)':bdr}`,borderRadius:12,padding:'8px 10px',minHeight:80,cursor:has?'pointer':'default',transition:'transform .12s,box-shadow .12s',boxShadow:isToday?'0 0 0 1px var(--indigo)':'none'}}
              onMouseEnter={e=>{if(has){e.currentTarget.style.transform='translateY(-2px)';e.currentTarget.style.boxShadow='var(--sh2)'}}}
              onMouseLeave={e=>{e.currentTarget.style.transform='';e.currentTarget.style.boxShadow=isToday?'0 0 0 1px var(--indigo)':'none'}}>
              <div style={{fontSize:11,fontWeight:isToday?900:700,color:isToday?'var(--indigo)':'var(--t3)',marginBottom:4}}>{d}</div>
              {has&&<>
                <div style={{fontSize:13,fontWeight:500,color:p>=0?'var(--accD)':'var(--t2)',lineHeight:1.1,letterSpacing:'-.5px'}}>{fmt(p,pct)}</div>
                <div style={{fontSize:9.5,color:'var(--t3)',marginTop:4,fontWeight:600}}>{data.count} {data.count===1?'trade':'trades'}</div>
              </>}
            </div>;
          })}
          <div style={{background:weekStats[wi].count?weekStats[wi].profit>=0?'color-mix(in srgb, var(--acc) 10%, transparent)':'rgba(148,163,184,.15)':'var(--s2)',border:`1.5px solid ${weekStats[wi].count?weekStats[wi].profit>=0?'color-mix(in srgb, var(--acc) 30%, transparent)':'var(--border2)':'var(--border)'}`,borderRadius:12,padding:'8px',minHeight:80,display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',gap:3}}>
            {weekStats[wi].count>0&&<>
              <div style={{fontSize:13,fontWeight:500,color:weekStats[wi].profit>=0?'var(--accD)':'var(--t2)',textAlign:'center'}}>{fmt(weekStats[wi].profit,weekStats[wi].pnl)}</div>
              <div style={{fontSize:9,color:'var(--t3)',textAlign:'center'}}>{weekStats[wi].count}t</div>
            </>}
          </div>
        </div>)}
      </div>
    </div>
  </div>;
});

/* ══════════════════════════════════════════════════
   DAY POPUP — with inline trade editing
══════════════════════════════════════════════════ */
function DayPopup({date,trades,onClose,ic,onEdit,editingId,setEditingId}){
  const dayTrades=trades.filter(t=>t.entryDate===date).sort((a,b)=>a.entryTime.localeCompare(b.entryTime));
  const[editForm,setEditForm]=useState(null);
  const[saved,setSaved]=useState(null);
  const[symFilter,setSymFilter]=useState('All');
  const[gradeFilter,setGradeFilter]=useState('All');
  const[sortBy,setSortBy]=useState('entryTime');
  const[sortDir,setSortDir]=useState(1);
  const inp={border:'1.5px solid var(--border)',borderRadius:8,padding:'6px 9px',fontSize:12,outline:'none',background:'var(--s2)',color:'var(--text)',width:'100%',boxSizing:'border-box',fontFamily:'inherit'};
  const sel={...inp,cursor:'pointer'};
  const syms=['All',...new Set(dayTrades.map(t=>t.symbol))];
  const visible=useMemo(()=>[...dayTrades]
    .filter(t=>(symFilter==='All'||t.symbol===symFilter)&&(gradeFilter==='All'||t.grade===gradeFilter))
    .sort((a,b)=>{let va=a[sortBy],vb=b[sortBy];if(['pnl','profit'].includes(sortBy)){va=+va;vb=+vb}return va>vb?sortDir:va<vb?-sortDir:0})
  ,[dayTrades,symFilter,gradeFilter,sortBy,sortDir]);
  const dayProfit=dayTrades.reduce((s,t)=>s+(t.profit||0),0);
  const dayPct=(dayProfit/ic)*100;
  const wins=dayTrades.filter(t=>t.pnl>0).length;
  const wr=dayTrades.length?Math.round(wins/dayTrades.length*100):0;
  const[yr,mo,dy]=date.split('-').map(Number);
  const MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const prettyDate=`${MN[mo-1]} ${dy}, ${yr}`;
  const startEdit=t=>{setEditingId(t.id);setEditForm({symbol:t.symbol,side:t.side||deriveDir(t),entryPrice:String(t.entryPrice||''),exitPrice:String(t.exitPrice||''),pnl:String(t.pnl||''),profit:String(t.profit||''),session:t.session||'London Open',model:t.model||'In Session',grade:t.grade||'A',expectedRR:t.expectedRR||'1:2',actualRR:t.actualRR||'',mistakes:t.mistakes||'None',notes:t.notes||''})};
  const cancelEdit=()=>{setEditingId(null);setEditForm(null)};
  const saveEdit=id=>{if(!editForm)return;onEdit(id,{...editForm,entryPrice:+editForm.entryPrice,exitPrice:+editForm.exitPrice,pnl:+editForm.pnl||0,profit:+editForm.profit||0});setSaved(id);setTimeout(()=>setSaved(null),1800);cancelEdit()};
  const toggleSort=f=>{if(sortBy===f)setSortDir(d=>-d);else{setSortBy(f);setSortDir(1)}};
  const SH=({l,f})=><span onClick={()=>toggleSort(f)} style={{fontSize:10,fontWeight:500,color:sortBy===f?'var(--accD)':'var(--t3)',letterSpacing:.1,cursor:'pointer',userSelect:'none'}}>{l}{sortBy===f?(sortDir>0?' ↑':' ↓'):' ↕'}</span>;
  return <div style={{position:'fixed',inset:0,background:'rgba(10,18,35,.55)',backdropFilter:'blur(16px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16}} onClick={onClose}>
    <div style={{background:'var(--surface)',borderRadius:20,boxShadow:'0 32px 80px rgba(0,0,0,.2)',width:720,maxWidth:'100%',maxHeight:'93vh',overflow:'auto',border:'1px solid var(--border)'}} onClick={e=>e.stopPropagation()}>
      {/* Header */}
      <div style={{padding:'22px 26px 16px',display:'flex',alignItems:'flex-start',justifyContent:'space-between',borderBottom:'1px solid var(--border)',position:'sticky',top:0,background:'var(--surface)',zIndex:10}}>
        <div><div style={{fontSize:10,fontWeight:600,color:'var(--t3)',letterSpacing:.1,marginBottom:5}}>📅 Day Summary</div><div style={{fontSize:20,fontWeight:600,letterSpacing:'-.4px'}}>{prettyDate}</div></div>
        <button onClick={onClose} style={{background:'var(--s3)',border:'1px solid var(--border)',color:'var(--t3)',cursor:'pointer',fontSize:16,padding:'6px 10px',borderRadius:9,fontWeight:700}} onMouseEnter={e=>{e.currentTarget.style.background='var(--rBg)';e.currentTarget.style.color='var(--red)'}} onMouseLeave={e=>{e.currentTarget.style.background='var(--s3)';e.currentTarget.style.color='var(--t3)'}}>×</button>
      </div>
      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,padding:'16px 26px 14px'}}>
        {[{l:'P&L%',v:fmtPct(dayPct),c:dayPct>=0?'var(--accD)':'var(--t2)',bg:dayPct>=0?'var(--accL)':'var(--s3)'},
          {l:'Net P&L',v:fmtUSD(dayProfit),c:dayProfit>=0?'var(--accD)':'var(--t2)',bg:dayProfit>=0?'var(--accL)':'var(--s3)'},
          {l:'Trades',v:dayTrades.length,c:'var(--text)',bg:'var(--s2)'},
          {l:'Win Rate',v:`${wr}%`,c:wr>=50?'var(--acc)':'var(--t2)',bg:'var(--s2)'},
        ].map((m,i)=><div key={i} style={{background:m.bg,border:'1px solid var(--border)',borderRadius:12,padding:'14px 16px'}}>
          <div style={{fontSize:9,fontWeight:600,color:'var(--t3)',letterSpacing:.1,marginBottom:8}}>{m.l}</div>
          <div style={{fontSize:20,fontWeight:600,color:m.c,letterSpacing:'-1px'}}>{m.v}</div>
        </div>)}
      </div>
      {/* Filters & Sort */}
      <div style={{padding:'0 26px 12px',display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{fontSize:11,color:'var(--t3)',fontWeight:600,marginRight:4}}>Filter:</span>
        {syms.map(s=><button key={s} onClick={()=>setSymFilter(s)} style={{padding:'3px 11px',borderRadius:20,border:`1.5px solid ${symFilter===s?'var(--acc)':'var(--border)'}`,background:symFilter===s?'var(--accF)':'var(--surface)',color:symFilter===s?'var(--accD)':'var(--t2)',fontWeight:symFilter===s?700:500,fontSize:11,cursor:'pointer'}}>{s}</button>)}
        <span style={{borderLeft:'1px solid var(--border)',height:16,margin:'0 4px'}}/>
        {['All',...GRADES].map(g=><button key={g} onClick={()=>setGradeFilter(g)} style={{padding:'3px 10px',borderRadius:20,border:`1.5px solid ${gradeFilter===g?'var(--acc)':'var(--border)'}`,background:gradeFilter===g?'var(--accF)':'var(--surface)',color:gradeFilter===g?'var(--accD)':'var(--t2)',fontWeight:gradeFilter===g?700:500,fontSize:11,cursor:'pointer'}}>{g}</button>)}
        <div style={{marginLeft:'auto',display:'flex',gap:10,alignItems:'center'}}>
          <SH l="Time" f="entryTime"/><SH l="P&L" f="pnl"/><SH l="Grade" f="grade"/>
        </div>
      </div>
      {/* Trade List */}
      <div style={{padding:'0 26px 24px',display:'flex',flexDirection:'column',gap:8}}>
        {visible.map((t,i)=>{
          const isEditing=editingId===t.id;
          const isSaved=saved===t.id;
          return <div key={t.id} style={{border:`1.5px solid ${isEditing?'var(--acc)':isSaved?'var(--gBdr)':'var(--border)'}`,borderRadius:14,overflow:'hidden',transition:'border-color .2s',background:isEditing?'var(--accF)':isSaved?'var(--gBg)':'var(--surface)'}}>
            {/* Trade Header Row */}
            <div style={{display:'grid',gridTemplateColumns:'2fr 1.2fr 1fr 1fr 1fr 1fr auto',gap:8,padding:'11px 16px',alignItems:'center',background:i%2===0?'var(--surface)':'var(--s2)'}}>
              <div style={{display:'flex',flexDirection:'column',gap:2}}>
                <span style={{fontSize:13,fontWeight:500,color:'var(--text)'}}>{t.symbol}</span>
                <span style={{fontSize:10,color:'var(--t3)'}}>{t.entryTime?.slice(0,5)||'—'} · {t.side||deriveDir(t)}</span>
              </div>
              <div><SessionChip session={t.session}/></div>
              <div><GradeChip grade={t.grade}/></div>
              <div style={{fontSize:13,fontWeight:700,color:t.pnl>=0?'var(--accD)':'var(--t2)'}}>{fmtPct(t.pnl)}</div>
              <div style={{fontSize:12,color:'var(--t3)'}}>{t.expectedRR||'—'}</div>
              <div style={{fontSize:11,color:'var(--t3)',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.model||'—'}</div>
              <div style={{display:'flex',gap:5}}>
                {!isEditing&&<button onClick={()=>startEdit(t)} style={{background:'linear-gradient(135deg,var(--acc),var(--accD))',color:'#fff',border:'none',borderRadius:8,padding:'5px 12px',fontSize:11,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>✏️ Edit</button>}
                {isEditing&&<><button onClick={()=>saveEdit(t.id)} style={{background:'var(--green)',color:'#fff',border:'none',borderRadius:8,padding:'5px 12px',fontSize:11,fontWeight:700,cursor:'pointer'}}>✓ Save</button><button onClick={cancelEdit} style={{background:'var(--s3)',color:'var(--t2)',border:'1px solid var(--border)',borderRadius:8,padding:'5px 10px',fontSize:11,fontWeight:700,cursor:'pointer'}}>✕</button></>}
              </div>
            </div>
            {/* Edit Form */}
            {isEditing&&editForm&&<div style={{padding:'16px',borderTop:'1px dashed color-mix(in srgb, var(--acc) 35%, transparent)',background:'var(--accF)'}}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:8,marginBottom:10}}>
                {[['Symbol','symbol'],['Entry Price','entryPrice'],['Exit Price','exitPrice'],['P&L %','pnl'],['Profit $','profit'],['Actual RR','actualRR']].map(([l,k])=><div key={k}>
                  <div style={{fontSize:9.5,fontWeight:400,color:'var(--t3)',marginBottom:4}}>{l}</div>
                  <input value={editForm[k]||''} onChange={e=>setEditForm(f=>({...f,[k]:e.target.value}))} style={inp}/>
                </div>)}
                <div><div style={{fontSize:9.5,fontWeight:400,color:'var(--t3)',marginBottom:4}}>Side</div>
                  <select value={editForm.side} onChange={e=>setEditForm(f=>({...f,side:e.target.value}))} style={sel}><option>Long</option><option>Short</option></select></div>
                <div><div style={{fontSize:9.5,fontWeight:400,color:'var(--t3)',marginBottom:4}}>Session</div>
                  <select value={editForm.session} onChange={e=>setEditForm(f=>({...f,session:e.target.value}))} style={sel}>{SESSIONS.map(s=><option key={s}>{s}</option>)}</select></div>
                <div><div style={{fontSize:9.5,fontWeight:400,color:'var(--t3)',marginBottom:4}}>Model</div>
                  <select value={editForm.model} onChange={e=>setEditForm(f=>({...f,model:e.target.value}))} style={sel}>{MODELS.map(m=><option key={m}>{m}</option>)}</select></div>
                <div><div style={{fontSize:9.5,fontWeight:400,color:'var(--t3)',marginBottom:4}}>Grade</div>
                  <select value={editForm.grade} onChange={e=>setEditForm(f=>({...f,grade:e.target.value}))} style={sel}>{GRADES.map(g=><option key={g}>{g}</option>)}</select></div>
                <div><div style={{fontSize:9.5,fontWeight:400,color:'var(--t3)',marginBottom:4}}>Mistakes</div>
                  <select value={editForm.mistakes} onChange={e=>setEditForm(f=>({...f,mistakes:e.target.value}))} style={sel}>{MISTAKES.map(m=><option key={m}>{m}</option>)}</select></div>
                <div><div style={{fontSize:9.5,fontWeight:400,color:'var(--t3)',marginBottom:4}}>Exp. RR</div>
                  <select value={editForm.expectedRR} onChange={e=>setEditForm(f=>({...f,expectedRR:e.target.value}))} style={sel}>{RR_OPTIONS.map(r=><option key={r}>{r}</option>)}</select></div>
              </div>
              <div><div style={{fontSize:9.5,fontWeight:400,color:'var(--t3)',marginBottom:4}}>Notes</div>
                <textarea value={editForm.notes} onChange={e=>setEditForm(f=>({...f,notes:e.target.value}))} rows={2} style={{...inp,resize:'vertical'}}/>
              </div>
              <div style={{display:'flex',gap:8,marginTop:10}}>
                <button onClick={()=>saveEdit(t.id)} style={{background:'linear-gradient(135deg,var(--acc),var(--accD))',color:'#fff',border:'none',borderRadius:10,padding:'9px 22px',fontSize:13,fontWeight:700,cursor:'pointer',boxShadow:'0 3px 12px color-mix(in srgb, var(--acc) 40%, transparent)'}}>✓ Save Changes</button>
                <button onClick={cancelEdit} style={{background:'var(--s3)',color:'var(--t2)',border:'1px solid var(--border)',borderRadius:10,padding:'9px 18px',fontSize:13,fontWeight:700,cursor:'pointer'}}>✕ Cancel</button>
              </div>
            </div>}
          </div>;
        })}
        {visible.length===0&&<div style={{textAlign:'center',padding:'30px',color:'var(--t3)',fontSize:13}}>No trades match filters</div>}
      </div>
    </div>
  </div>;
}

/* ══════════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════════ */
function Sidebar({activeTab,setTab,sidebarOpen,setSidebarOpen,setSidebarHover,userName,setUserName,accounts,seedTrades,editingUi,setEditingUi,uiBlocks,toggleBlock,resetUi,onOpenSettings,theme,setTheme}){

    {id:'overview',label:'Overview',icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>},
    {id:'analytics',label:'Analytics',icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
    {id:'psychology',label:'Psychology',icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>},
    {id:'tradelog',label:'Trade Log',icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>},
    {id:'calendar',label:'Calendar',icon:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
  ];
  const allT=accounts.length?accounts.flatMap(a=>a.trades):seedTrades;
  const totalPnl=allT.reduce((s,t)=>s+t.pnl,0);
  const initials=userName.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const click=id=>{setTab(id);if(isMobile)setSidebarOpen(false)};

  if(!sidebarOpen)return <div style={{width:isMobile?0:56,background:'var(--surface)',height:'100vh',position:'fixed',left:0,top:0,zIndex:200,display:isMobile?'none':'flex',flexDirection:'column',alignItems:'center',paddingTop:12,gap:2,borderRight:'1px solid var(--border)',boxShadow:'var(--sh1)'}}
    onMouseEnter={()=>setSidebarHover&&setSidebarHover(true)}
    onMouseLeave={()=>setSidebarHover&&setSidebarHover(false)}>

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

  return <>
    {isMobile&&<div onClick={()=>setSidebarOpen(false)} style={{position:'fixed',inset:0,background:'rgba(0,0,0,.35)',zIndex:199}}/>}
    {/* Hover zone trigger strip */}
    {!isMobile&&<div style={{position:'fixed',left:0,top:0,width:8,height:'100vh',zIndex:198}} onMouseEnter={()=>setSidebarHover&&setSidebarHover(true)}/>}
    <div style={{width:228,background:'var(--surface)',height:'100vh',position:'fixed',left:0,top:0,zIndex:200,display:'flex',flexDirection:'column',borderRight:'1px solid var(--border)',boxShadow:'var(--sh3)',animation:'sidebarSlide .22s cubic-bezier(.22,1,.36,1)'}}
      onMouseLeave={()=>setSidebarHover&&setSidebarHover(false)}>
      {/* Header */}
      <div style={{padding:'16px 16px 12px',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:38,height:38,borderRadius:12,background:'linear-gradient(135deg,var(--acc),var(--accD))',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 3px 12px color-mix(in srgb, var(--acc) 40%, transparent)'}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:14,fontWeight:600,letterSpacing:'-.3px',lineHeight:1.1}}>TradeJournal</div>
          <div style={{fontSize:9,fontWeight:400,color:'var(--t3)',letterSpacing:.5,textTransform:'uppercase',marginTop:2}}>Pro · v7.0</div>
        </div>
        <button onClick={()=>setSidebarOpen(false)} style={{background:'none',border:'1px solid var(--border)',color:'var(--t3)',cursor:'pointer',padding:4,borderRadius:7,display:'flex',alignItems:'center',width:26,height:26,justifyContent:'center'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--acc)';e.currentTarget.style.color='var(--acc)'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--t3)'}}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
      </div>
      {/* CTA */}
      <div style={{padding:'0 12px 14px'}}>
        <button onClick={()=>click('tradelog')} style={{width:'100%',background:'linear-gradient(135deg,var(--acc),var(--accD))',color:'#fff',border:'none',borderRadius:11,padding:'11px 16px',fontSize:13,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:8,boxShadow:'0 4px 14px color-mix(in srgb, var(--acc) 38%, transparent)'}}>
          <div style={{width:22,height:22,borderRadius:6,background:'rgba(255,255,255,.2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:300}}>+</div>
          Log Trade
        </button>
      </div>
      {/* Nav */}
      <div style={{flex:1,padding:'0 8px',display:'flex',flexDirection:'column',gap:2,overflowY:'auto'}}>
        {TABS.map(t=>{const active=activeTab===t.id;return <button key={t.id} onClick={()=>click(t.id)} className="nav-btn" style={{background:active?'color-mix(in srgb, var(--acc) 10%, transparent)':'transparent',color:active?'var(--acc)':'var(--t2)',fontWeight:active?700:500,fontSize:13,boxShadow:active?'inset 0 0 0 1px color-mix(in srgb, var(--acc) 25%, transparent)':'none'}}>
          <span style={{opacity:active?1:.6}}>{t.icon}</span>
          <span style={{flex:1}}>{t.label}</span>
          {active&&<div style={{width:6,height:6,borderRadius:'50%',background:'var(--acc)'}}/>}
        </button>})}
      </div>
      {/* UI Edit Panel */}
      {editingUi&&<div style={{margin:'0 8px 8px',background:'var(--s2)',border:'1px solid var(--border)',borderRadius:12,padding:'10px 12px'}}>
        <div style={{fontSize:10,fontWeight:500,color:'var(--t3)',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          UI Blocks
          <button onClick={resetUi} style={{background:'var(--accF)',border:'1px solid color-mix(in srgb, var(--acc) 30%, transparent)',color:'var(--accD)',borderRadius:6,padding:'2px 8px',fontSize:9,fontWeight:700,cursor:'pointer'}}>Reset All</button>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {Object.entries({bestTradeGrade:'Best Trade Grade',disciplineScore:'Discipline Score',bestMindset:'Best Mindset',worstMindset:'Worst Mindset',mistakeRate:'Mistake Rate',equityCurve:'Equity Curve',monthlyBars:'Monthly Bars',winRateCard:'Win Rate Card',gradeBreakdown:'Grade Breakdown',sessionBreakdown:'Session Breakdown',modelBreakdown:'Model Breakdown'}).map(([k,label])=><label key={k} style={{display:'flex',alignItems:'center',gap:7,cursor:'pointer'}}>
            <div onClick={()=>toggleBlock(k)} style={{width:28,height:15,borderRadius:8,background:uiBlocks[k]?'var(--acc)':'var(--border2)',position:'relative',cursor:'pointer',transition:'background .2s',flexShrink:0}}>
              <div style={{position:'absolute',top:2,left:uiBlocks[k]?13:2,width:11,height:11,borderRadius:'50%',background:'#fff',transition:'left .15s',boxShadow:'0 1px 3px rgba(0,0,0,.2)'}}/>
            </div>
            <span style={{fontSize:10.5,color:uiBlocks[k]?'var(--text)':'var(--t3)',fontWeight:uiBlocks[k]?600:400}}>{label}</span>
          </label>)}
        </div>
      </div>}
      {/* Footer */}
      <div style={{padding:'12px 14px',borderTop:'1px solid var(--border)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
          <div style={{width:34,height:34,borderRadius:10,background:'linear-gradient(135deg,var(--acc),var(--accD))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:600,color:'#fff',flexShrink:0,boxShadow:'0 2px 8px color-mix(in srgb, var(--acc) 30%, transparent)'}}>{initials}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12.5,fontWeight:700,color:'var(--text)'}}>{userName}</div>
            <div style={{fontSize:10,color:'var(--t3)',marginTop:1}}>{allT.length} trades · <span style={{color:totalPnl>=0?'var(--acc)':'var(--t3)',fontWeight:700}}>{fmtPct(totalPnl)}</span></div>
          </div>
        </div>
        {/* Edit UI Button */}
        <button onClick={()=>setEditingUi(e=>!e)} style={{width:'100%',background:editingUi?'var(--accF)':'var(--s2)',border:`1px solid ${editingUi?'color-mix(in srgb, var(--acc) 40%, transparent)':'var(--border)'}`,color:editingUi?'var(--accD)':'var(--t3)',borderRadius:9,padding:'7px 10px',fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:7,marginBottom:6}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          {editingUi?'✓ Done Editing UI':'✏️ Edit UI'}
        </button>
        <button onClick={()=>{onOpenSettings&&onOpenSettings()}} style={{width:'100%',background:'var(--s2)',border:'1px solid var(--border)',color:'var(--t3)',borderRadius:9,padding:'7px 10px',fontSize:11,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:7,marginBottom:7}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--acc)';e.currentTarget.style.color='var(--accD)'}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--t3)'}}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
          ⚙️ Appearance
        </button>
        <div style={{fontSize:9.5,color:'var(--t3)',textAlign:'center',paddingTop:8,borderTop:'1px solid var(--border)',letterSpacing:.3}}>TradeJournal Pro · v7.0</div>
      </div>
    </div>
  </>;
}

/* ══════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════ */
const DEFAULT_UI_BLOCKS={bestTradeGrade:true,disciplineScore:true,bestMindset:true,worstMindset:true,mistakeRate:true,equityCurve:true,monthlyBars:true,winRateCard:true,gradeBreakdown:true,sessionBreakdown:true,modelBreakdown:true};
function App(){
  const[tab,setTab]=useState('overview');
  const[toast,setToast]=useState(null);
  const[syncingId,setSyncingId]=useState(null);
  const[activeAccId,setActiveAccId]=useState('all');
  const[accounts,setAccounts]=useState(()=>loadAccounts());
  const[tradeMeta,setTradeMeta]=useState(()=>loadTradeMeta());
  const[sidebarOpen,setSidebarOpen]=useState(false);
  const[sidebarHover,setSidebarHover]=useState(false);
  const[uiBlocks,setUiBlocks]=useState(()=>{try{const r=localStorage.getItem('tj5_uiblocks');return r?{...DEFAULT_UI_BLOCKS,...JSON.parse(r)}:DEFAULT_UI_BLOCKS}catch{return DEFAULT_UI_BLOCKS}});
  const[editingUi,setEditingUi]=useState(false);
  const[userName,setUserName]=useState(()=>{try{return localStorage.getItem('tj5_username')||'Trader'}catch{return'Trader'}});
  const[dayPopup,setDayPopup]=useState(null);
  const[editingDayTrade,setEditingDayTrade]=useState(null);
  const[dateRange,setDateRange]=useState({from:null,to:null});
  const[theme,setTheme]=useState(()=>loadTheme());
  const[accent,setAccent]=useState(()=>loadAccent());
  const[showSettings,setShowSettings]=useState(false);
  const isMobile=useMediaQuery('(max-width:768px)');
  const sidebarEffectiveOpen=sidebarOpen||sidebarHover;

  // Apply theme + accent to document
  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
    document.documentElement.setAttribute('data-accent',accent);
    try{localStorage.setItem('tj5_theme',theme);localStorage.setItem('tj5_accent',accent)}catch{}
  },[theme,accent]);

  useEffect(()=>{if(!isMobile)setSidebarOpen(true)},[isMobile]);
  useEffect(()=>{try{localStorage.setItem('tj5_uiblocks',JSON.stringify(uiBlocks))}catch{}},[uiBlocks]);
  const toggleBlock=useCallback(k=>setUiBlocks(b=>({...b,[k]:!b[k]})),[]);
  const resetUi=useCallback(()=>setUiBlocks(DEFAULT_UI_BLOCKS),[]);
  // Save full accounts including trades on every change
  useEffect(()=>{saveAccounts(accounts)},[accounts]);
  useEffect(()=>{try{localStorage.setItem('tj5_meta',JSON.stringify(tradeMeta))}catch{}},[tradeMeta]);

  const showToast=useCallback((msg,type='info')=>{setToast({msg,type});setTimeout(()=>setToast(null),4500)},[]);

  const handleSync=useCallback(async acc=>{
    if(acc.isDemo){showToast(`${acc.label} is a demo account — no sync needed`,'info');return;}
    setSyncingId(acc.id);
    try{
      const res=await fetch(`${API_URL}/sync-account`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:acc.login,password:acc.password,server:acc.server})});
      if(!res.ok){let m=`Server error ${res.status}`;try{const j=await res.json();m=j.error||m}catch{}throw new Error(m)}
      const data=await res.json();
      const incoming=(data.trades||[]).map(t=>({...t,accountId:acc.id}));
      setAccounts(prev=>prev.map(a=>a.id!==acc.id?a:{...a,trades:incoming,info:data.account||null,connected:true,lastSync:new Date().toLocaleTimeString()}));
      showToast(`✓ ${acc.label} — ${incoming.length} trades synced`,'success');
    }catch(err){showToast(err.message.includes('fetch')||err.message.includes('Failed')?'Cannot reach MT5 backend':err.message,'error');setAccounts(prev=>prev.map(a=>a.id!==acc.id?a:{...a,connected:false}));}
    finally{setSyncingId(null);}
  },[showToast]);

  const handleAddAcc=useCallback(c=>{
    const id=Date.now().toString();
    const na={...c,id,trades:[],info:null,connected:false,lastSync:null};
    setAccounts(p=>[...p,na]);
    if(!c.isDemo)setTimeout(()=>handleSync(na),60);
    else showToast(`✓ ${c.label} demo account created`,'success');
  },[handleSync,showToast]);
  const handleRemoveAcc=useCallback(id=>{setAccounts(p=>p.filter(a=>a.id!==id));if(activeAccId===id)setActiveAccId('all')},[activeAccId]);

  // Use SEED if no accounts
  const allTrades=useMemo(()=>{
    if(accounts.length===0)return SEED;
    if(activeAccId==='all')return accounts.flatMap(a=>a.trades);
    return accounts.find(a=>a.id===activeAccId)?.trades||[];
  },[accounts,activeAccId]);

  const displayTrades=useMemo(()=>{
    if(!dateRange.from&&!dateRange.to)return allTrades;
    return allTrades.filter(t=>(!dateRange.from||t.entryDate>=dateRange.from)&&(!dateRange.to||t.entryDate<=dateRange.to));
  },[allTrades,dateRange]);

  const handleDeleteTrade=useCallback(id=>setAccounts(p=>p.map(a=>({...a,trades:a.trades.filter(t=>t.id!==id)}))),[]);
  const handleEditTrade=useCallback((id,patch)=>setAccounts(p=>p.map(a=>({...a,trades:a.trades.map(t=>t.id!==id?t:{...t,...patch,id})}))),[]);
  const handleAddTrade=useCallback(t=>{
    const nt={...t,id:Date.now(),accountId:'manual'};
    setAccounts(p=>{
      if(p.length===0){
        // Auto-create a demo account
        const demo={id:'demo-auto',label:'My Account',isDemo:true,connected:false,trades:[nt]};
        return [demo];
      }
      return p.map((a,i)=>i===0?{...a,trades:[nt,...a.trades]}:a);
    });
  },[]);
  const handleUpdateMeta=useCallback((id,patch)=>setTradeMeta(m=>{const next={...m,[id]:{...(m[id]||{}),...patch}};return next}),[]);
  const saveUserName=n=>{setUserName(n);try{localStorage.setItem('tj5_username',n)}catch{}};

  const TABS_INFO=[{id:'overview',label:'Overview'},{id:'analytics',label:'Analytics'},{id:'psychology',label:'Psychology'},{id:'tradelog',label:'Trade Log'},{id:'calendar',label:'Calendar'}];
  const live=accounts.filter(a=>a.connected).length;
  const showDateBar=['overview','analytics','tradelog'].includes(tab);
  const sideW=isMobile?0:sidebarEffectiveOpen?228:56;
  const ic=inferCapital(allTrades);

  // Settings Modal
  const THEMES=[{id:'light',label:'Light',icon:'☀️'},{id:'dark',label:'Dark',icon:'🌙'}];
  const ACCENTS=[
    {id:'amber',label:'Amber',col:'#c8983a'},{id:'emerald',label:'Emerald',col:'#059669'},
    {id:'sky',label:'Sky',col:'#0284c7'},{id:'violet',label:'Violet',col:'#7c3aed'},
    {id:'rose',label:'Rose',col:'#e11d48'},{id:'teal',label:'Teal',col:'#0d9488'},
    {id:'indigo',label:'Indigo',col:'#4f46e5'},{id:'slate',label:'Slate',col:'#475569'},
  ];

  return <ErrorBoundary>
    <div style={{minHeight:'100vh',background:'var(--bg)',color:'var(--text)'}}>
      {/* Settings Modal */}
      {showSettings&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',backdropFilter:'blur(12px)',zIndex:600,display:'flex',alignItems:'center',justifyContent:'center',padding:16,animation:'fadeIn .2s ease'}} onClick={()=>setShowSettings(false)}>
        <div style={{background:'var(--surface)',borderRadius:20,border:'1px solid var(--border)',width:460,maxWidth:'100%',maxHeight:'90vh',overflow:'auto',boxShadow:'var(--sh3)',animation:'scaleIn .22s cubic-bezier(.22,1,.36,1)'}} onClick={e=>e.stopPropagation()}>
          <div style={{padding:'22px 24px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:16,fontWeight:600,letterSpacing:'-.3px'}}>⚙️ Appearance Settings</div>
            <button onClick={()=>setShowSettings(false)} style={{background:'var(--s3)',border:'1px solid var(--border)',borderRadius:9,padding:'6px 11px',cursor:'pointer',color:'var(--t2)',fontSize:16,fontWeight:700}}>×</button>
          </div>
          <div style={{padding:'20px 24px',display:'flex',flexDirection:'column',gap:22}}>
            {/* Theme */}
            <div>
              <div style={{fontSize:10.5,fontWeight:500,color:'var(--t3)',letterSpacing:.1,marginBottom:12}}>Theme Mode</div>
              <div style={{display:'flex',gap:10}}>
                {THEMES.map(t=><button key={t.id} onClick={()=>setTheme(t.id)} style={{flex:1,padding:'14px 16px',borderRadius:14,border:`2px solid ${theme===t.id?'var(--acc)':'var(--border)'}`,background:theme===t.id?'color-mix(in srgb, var(--acc) 10%, var(--surface))':'var(--s2)',cursor:'pointer',transition:'all .2s'}}>
                  <div style={{fontSize:24,marginBottom:6}}>{t.icon}</div>
                  <div style={{fontSize:13,fontWeight:700,color:theme===t.id?'var(--accD)':'var(--text)'}}>{t.label}</div>
                  {theme===t.id&&<div style={{width:6,height:6,borderRadius:'50%',background:'var(--acc)',margin:'6px auto 0'}}/>}
                </button>)}
              </div>
            </div>
            {/* Light theme accent */}
            <div>
              <div style={{fontSize:10.5,fontWeight:500,color:'var(--t3)',letterSpacing:.1,marginBottom:12}}>Accent Color (Both Themes)</div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
                {ACCENTS.map(a=><button key={a.id} onClick={()=>setAccent(a.id)} style={{padding:'10px 8px',borderRadius:12,border:`2px solid ${accent===a.id?a.col:'var(--border)'}`,background:accent===a.id?`${a.col}18`:'var(--s2)',cursor:'pointer',transition:'all .18s',display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                  <div style={{width:22,height:22,borderRadius:'50%',background:a.col,boxShadow:accent===a.id?`0 0 0 3px ${a.col}40`:'none',transition:'box-shadow .2s'}}/>
                  <div style={{fontSize:10.5,fontWeight:700,color:accent===a.id?a.col:'var(--t3)'}}>{a.label}</div>
                </button>)}
              </div>
            </div>
            {/* Preview */}
            <div style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:14,padding:'16px'}}>
              <div style={{fontSize:10,fontWeight:500,color:'var(--t3)',marginBottom:10}}>Preview</div>
              <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
                <div style={{background:'var(--surface)',border:`2px solid var(--acc)`,borderRadius:10,padding:'8px 14px',fontSize:12,fontWeight:700,color:'var(--accD)'}}>Active Card</div>
                <button style={{background:'linear-gradient(135deg,var(--acc),var(--accD))',color:'#fff',border:'none',borderRadius:9,padding:'8px 16px',fontSize:12,fontWeight:700,cursor:'default'}}>Primary Button</button>
                <div style={{fontSize:20,fontWeight:600,color:'var(--text)',letterSpacing:'-1px',fontFamily:"'Outfit',sans-serif"}}>+10.4%</div>
              </div>
            </div>
            <div style={{fontSize:11.5,color:'var(--t3)',textAlign:'center'}}>Settings are saved automatically</div>
          </div>
        </div>
      </div>}
      {dayPopup&&<DayPopup date={dayPopup} trades={allTrades} onClose={()=>{setDayPopup(null);setEditingDayTrade(null)}} ic={ic} onEdit={handleEditTrade} editingId={editingDayTrade} setEditingId={setEditingDayTrade}/>}
      <Sidebar activeTab={tab} setTab={setTab} sidebarOpen={sidebarEffectiveOpen} setSidebarOpen={setSidebarOpen} setSidebarHover={setSidebarHover} userName={userName} setUserName={saveUserName} accounts={accounts} seedTrades={SEED} editingUi={editingUi} setEditingUi={setEditingUi} uiBlocks={uiBlocks} toggleBlock={toggleBlock} resetUi={resetUi} onOpenSettings={()=>setShowSettings(true)} theme={theme} setTheme={setTheme}/>
      {toast&&<div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'var(--surface)',borderRadius:16,padding:'13px 18px',fontSize:13,fontWeight:600,boxShadow:'var(--sh3)',display:'flex',alignItems:'center',gap:12,maxWidth:isMobile?'calc(100vw - 32px)':400,animation:'fadeUp .25s ease',border:`1px solid ${toast.type==='success'?'var(--gBdr)':toast.type==='error'?'var(--rBdr)':'var(--border)'}`}}>
        <span style={{width:32,height:32,borderRadius:9,background:toast.type==='success'?'var(--gBg)':toast.type==='error'?'var(--rBg)':'var(--s2)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,flexShrink:0}}>
          {toast.type==='success'?'✓':toast.type==='error'?'✕':'ℹ'}
        </span>
        <span style={{flex:1,lineHeight:1.5}}>{toast.msg}</span>
        <button onClick={()=>setToast(null)} style={{background:'none',border:'none',color:'var(--t3)',cursor:'pointer',fontSize:18,padding:'0 2px',lineHeight:1}}>×</button>
      </div>}
      <div style={{marginLeft:sideW,transition:'margin-left .2s ease',minHeight:'100vh'}}>
        {/* Topbar */}
        <div style={{background:'var(--topbar-bg)',borderBottom:'1px solid var(--border)',padding:'0 20px',height:52,display:'flex',alignItems:'center',gap:10,position:'sticky',top:0,zIndex:100,backdropFilter:'blur(12px)',WebkitBackdropFilter:'blur(12px)'}}>
          <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,var(--acc),transparent)`,opacity:.7}}/>
          {isMobile&&<button onClick={()=>setSidebarOpen(true)} style={{background:'none',border:'none',cursor:'pointer',padding:6,display:'flex',alignItems:'center',color:'var(--t2)'}}>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>}
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:3,height:20,background:`linear-gradient(180deg,var(--acc),var(--accD))`,borderRadius:2}}/>
            <h1 style={{margin:0,fontSize:15,fontWeight:600,letterSpacing:'-.2px',fontFamily:"'Outfit',sans-serif"}}>{TABS_INFO.find(t=>t.id===tab)?.label||''}</h1>
          </div>
          {live>0&&<div className="hide-m" style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'var(--green)',fontWeight:700,background:'var(--gBg)',border:'1px solid var(--gBdr)',borderRadius:20,padding:'3px 11px'}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'var(--green)',display:'inline-block',animation:'pulse 2s infinite'}}/>
            {live} Live
          </div>}
          {accounts.length===0&&<div className="hide-m" style={{fontSize:11,color:'var(--t3)',background:'var(--s3)',border:'1px solid var(--border)',borderRadius:20,padding:'3px 11px'}}>Demo Mode — Sample data</div>}
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
            {/* Quick theme toggle */}
            <button onClick={()=>setTheme(t=>t==='light'?'dark':'light')} title="Toggle theme" style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:9,width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,color:'var(--t2)',transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--acc)';e.currentTarget.style.color='var(--accD)'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)';e.currentTarget.style.color='var(--t2)'}}>
              {theme==='light'?'🌙':'☀️'}
            </button>
            <button onClick={()=>setShowSettings(true)} title="Settings" style={{background:'var(--s2)',border:'1px solid var(--border)',borderRadius:9,width:32,height:32,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t2)',transition:'all .15s'}} onMouseEnter={e=>{e.currentTarget.style.borderColor='var(--acc)'}} onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--border)'}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            </button>
          </div>
        </div>
        {/* Content */}
        <div className="content-area" style={{maxWidth:tab==='calendar'?1400:1180,margin:'0 auto',padding:'22px 20px 80px'}}>
          <AccountsPanel accounts={accounts} onSync={handleSync} onRemove={handleRemoveAcc} onAdd={handleAddAcc} syncingId={syncingId}/>
          {/* Account filter */}
          {accounts.length>0&&<div style={{display:'flex',gap:7,marginBottom:18,flexWrap:'wrap',alignItems:'center'}}>
            {[{id:'all',label:'🌐 All',cnt:accounts.reduce((s,a)=>s+a.trades.length,0),col:null},...accounts.map((a,i)=>({id:a.id,label:a.label,cnt:a.trades.length,col:ACC_COLS[i%ACC_COLS.length],isDemo:a.isDemo}))].map(item=><button key={item.id} onClick={()=>setActiveAccId(item.id)} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 14px',borderRadius:20,border:`1.5px solid ${activeAccId===item.id?(item.col||'var(--acc)'):'var(--border)'}`,background:activeAccId===item.id?(item.col?item.col+'20':'var(--accF)'):'var(--surface)',color:activeAccId===item.id?(item.col||'var(--acc)'):'var(--t2)',fontWeight:activeAccId===item.id?700:500,fontSize:12,cursor:'pointer'}}>
              {item.col&&<span style={{width:7,height:7,borderRadius:'50%',background:item.col}}/>}
              {item.label}
              {item.isDemo&&<Chip color="purple" size="sm">Demo</Chip>}
              <span style={{background:'var(--s3)',borderRadius:10,padding:'1px 7px',fontSize:10,fontWeight:700}}>{item.cnt}</span>
            </button>)}
          </div>}
          {showDateBar&&<DateRangeBar trades={allTrades} dateRange={dateRange} setDateRange={setDateRange}/>}
          <div key={tab} className="fade-up">
            {tab==='overview'&&<Overview trades={displayTrades} uiBlocks={uiBlocks}/>}
            {tab==='analytics'&&<Analytics trades={displayTrades} uiBlocks={uiBlocks}/>}
            {tab==='psychology'&&<Psychology trades={displayTrades} uiBlocks={uiBlocks}/>}
            {tab==='tradelog'&&<TradeLog trades={displayTrades} onAdd={handleAddTrade} onDelete={handleDeleteTrade} onEdit={handleEditTrade} onUpdateMeta={handleUpdateMeta} tradeMeta={tradeMeta}/>}
            {tab==='calendar'&&<CalendarView trades={allTrades} onDayClick={setDayPopup}/>}
          </div>
        </div>
      </div>
    </div>
  </ErrorBoundary>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
